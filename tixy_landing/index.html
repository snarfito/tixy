<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tixy Glamour</title>
  <meta name="description" content="Tixy Glamour — Moda con identidad propia." />
  <meta property="og:title" content="Tixy Glamour" />
  <meta property="og:description" content="Moda con identidad propia." />
  <meta property="og:url" content="https://tixyglamour.com" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:      #C0206A;
      --pink-lite: #FAE0EE;
      --dark:      #1A0D14;
      --dark2:     #2e0d1e;
      --gold:      #c9907a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Montserrat', sans-serif;
      color: #fff;
      cursor: default;
    }

    /* ── Canvas fondo ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Grain overlay ── */
    .grain {
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      z-index: 1;
      opacity: .045;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: grain 0.8s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{transform:translate(0,0)}
      10%{transform:translate(-2%,-3%)}
      20%{transform:translate(3%,1%)}
      30%{transform:translate(-1%,4%)}
      40%{transform:translate(4%,-2%)}
      50%{transform:translate(-3%,3%)}
      60%{transform:translate(2%,-4%)}
      70%{transform:translate(-4%,2%)}
      80%{transform:translate(1%,-1%)}
      90%{transform:translate(-2%,4%)}
    }

    /* ── Contenedor principal ── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── Línea decorativa top ── */
    .deco-line {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(192,32,106,.5));
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeSlideDown .8s ease .3s forwards;
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center;
      opacity: 0;
      animation: fadeSlideDown .9s ease .55s forwards;
    }

    .logo-script {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(5rem, 15vw, 10rem);
      line-height: 1;
      background: linear-gradient(135deg,
        #f5c0d8 0%,
        #e8a0c0 25%,
        #d4608c 55%,
        #c9907a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 24px rgba(192,32,106,.35));
      letter-spacing: .02em;
    }

    .logo-sub {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(.55rem, 1.4vw, .75rem);
      letter-spacing: .5em;
      text-transform: uppercase;
      color: rgba(255,255,255,.28);
      margin-top: .6rem;
    }

    /* ── Divisor ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.8rem 0;
      opacity: 0;
      animation: fadeSlideDown .8s ease .85s forwards;
    }
    .divider::before,
    .divider::after {
      content: '';
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(192,32,106,.45));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, rgba(192,32,106,.45));
    }
    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--pink);
      transform: rotate(45deg);
      opacity: .7;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: rgba(255,255,255,.45);
      letter-spacing: .08em;
      text-align: center;
      opacity: 0;
      animation: fadeSlideDown .8s ease 1.05s forwards;
    }

    /* ── Botón CTA ── */
    .cta-wrap {
      margin-top: 3.2rem;
      opacity: 0;
      animation: fadeSlideDown .8s ease 1.3s forwards;
    }

    .btn-cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      padding: 1rem 2.8rem;
      border: 1px solid rgba(192,32,106,.4);
      background: rgba(192,32,106,.08);
      color: rgba(255,255,255,.85);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: .75rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 0;
      transition: all .4s ease;
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    .btn-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(192,32,106,.2), rgba(201,144,122,.1));
      transform: translateX(-100%);
      transition: transform .4s ease;
    }

    .btn-cta:hover::before { transform: translateX(0); }

    .btn-cta:hover {
      border-color: rgba(192,32,106,.8);
      color: #fff;
      box-shadow: 0 0 30px rgba(192,32,106,.2), inset 0 0 20px rgba(192,32,106,.05);
      gap: 1rem;
    }

    .btn-arrow {
      font-size: .9rem;
      transition: transform .3s ease;
    }
    .btn-cta:hover .btn-arrow { transform: translateX(3px); }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: .6rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: rgba(255,255,255,.12);
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
      white-space: nowrap;
    }

    /* ── Animaciones ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── Partículas flotantes (generadas por JS en el canvas) ── */
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="grain"></div>

  <main class="stage">
    <div class="deco-line"></div>

    <div class="logo-wrap">
      <div class="logo-script">Tixy</div>
      <div class="logo-sub">Glamour</div>
    </div>

    <div class="divider">
      <div class="divider-diamond"></div>
    </div>

    <p class="tagline">Moda con identidad propia</p>

    <div class="cta-wrap">
      <a href="https://app.tixyglamour.com" class="btn-cta">
        <span>Acceder al sistema</span>
        <span class="btn-arrow">→</span>
      </a>
    </div>
  </main>

  <p class="footer">Tixy Glamour &nbsp;·&nbsp; Colombia &nbsp;·&nbsp; 2026</p>

  <script>
    // ── Fondo animado: partículas + mesh gradient ──────────────────────────
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [], mouse = { x: 0, y: 0 };

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); initParticles(); });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // Partículas
    class Particle {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x  = Math.random() * W;
        this.y  = init ? Math.random() * H : H + 10;
        this.r  = Math.random() * 1.5 + .3;
        this.vx = (Math.random() - .5) * .15;
        this.vy = -(Math.random() * .4 + .1);
        this.alpha = Math.random() * .35 + .05;
        this.life  = 0;
        this.maxLife = Math.random() * 300 + 200;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        // Leve atracción al mouse
        const dx = mouse.x - this.x, dy = mouse.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200) {
          this.vx += dx / dist * .003;
          this.vy += dy / dist * .003;
        }
        if (this.life > this.maxLife || this.y < -10) this.reset();
      }
      draw() {
        const fade = Math.min(this.life / 60, 1) * Math.min((this.maxLife - this.life) / 60, 1);
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245,192,216,${this.alpha * fade})`;
        ctx.fill();
        ctx.restore();
      }
    }

    function initParticles() {
      particles = Array.from({ length: 120 }, () => new Particle());
    }
    initParticles();

    // Orbs de luz animados
    const orbs = [
      { x: .2, y: .3, r: .45, color: [192, 32, 106],  speed: .0004, offset: 0 },
      { x: .8, y: .7, r: .5,  color: [46,  13, 30],   speed: .0003, offset: 1 },
      { x: .5, y: .15,r: .35, color: [201,144,122],   speed: .0005, offset: 2 },
      { x: .1, y: .8, r: .4,  color: [140, 20, 70],   speed: .00035,offset: 3 },
      { x: .9, y: .2, r: .38, color: [80,  10, 40],   speed: .00045,offset: 4 },
    ];

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Fondo base
      ctx.fillStyle = '#1a0d14';
      ctx.fillRect(0, 0, W, H);

      // Orbs suaves — movimiento muy lento, casi imperceptible
      orbs.forEach(o => {
        const cx = (o.x + Math.sin(t * o.speed + o.offset) * .08) * W;
        const cy = (o.y + Math.cos(t * o.speed + o.offset) * .06) * H;
        const radius = o.r * Math.min(W, H);
        const [r, g, b] = o.color;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        grad.addColorStop(0,   `rgba(${r},${g},${b},.18)`);
        grad.addColorStop(.5,  `rgba(${r},${g},${b},.07)`);
        grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      });

      // Partículas
      particles.forEach(p => { p.update(); p.draw(); });

      // Vignette
      const vig = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,Math.max(W,H)*.7);
      vig.addColorStop(0,   'rgba(0,0,0,0)');
      vig.addColorStop(.7,  'rgba(0,0,0,.15)');
      vig.addColorStop(1,   'rgba(0,0,0,.6)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      t += 0.005;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
