<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5c0d8"/>
      <stop offset="40%"  stop-color="#d4608c"/>
      <stop offset="100%" stop-color="#c9907a"/>
    </linearGradient>
  </defs>
  <!-- Fondo oscuro -->
  <rect width="100" height="100" rx="22" fill="#1A0D14"/>
  <!-- T elegante tipo script: trazo horizontal + trazo vertical con remates finos -->
  <!-- Barra horizontal superior -->
  <rect x="18" y="22" width="64" height="7" rx="3.5" fill="url(#g)"/>
  <!-- Trazo vertical centrado, más delgado, con leve curva visual -->
  <rect x="43" y="22" width="14" height="58" rx="5" fill="url(#g)"/>
</svg>
